<!doctype html>
<html><head><meta charset="utf-8"><title>Shield WebP test</title>
<style>body{background:#0f172a;color:#fff;font-family:sans-serif;padding:20px}
.box{display:inline-block;margin:10px;padding:10px;background:#1e293b;border-radius:8px}
img{display:block;width:480px;height:auto}</style></head>
<body>
<h1>Shield animation test</h1>
<p>If the WebP is animating, you should see motion in the box below. If it shows a fully formed shield with no motion, the animation isn't playing.</p>
<div class="box">
  <h3>From CDN (currently used by site)</h3>
  <img src="https://d3gkfgi9drj9kb.cloudfront.net/image-assets/shield_animation_v2.webp" alt="">
</div>
<div class="box">
  <h3>Static last frame (placeholder)</h3>
  <img src="https://d3gkfgi9drj9kb.cloudfront.net/image-assets/shield_lastframe.webp" alt="">
</div>
<div class="box">
  <h3>Reference animated WebP (Google sample) — control test</h3>
  <img src="https://www.gstatic.com/webp/animated/animated_webp_demo_1.webp" alt="" style="width:320px">
</div>
<p id="now"></p>
<script>setInterval(()=>{document.getElementById('now').textContent=new Date().toISOString()},100)</script>
</body></html>
