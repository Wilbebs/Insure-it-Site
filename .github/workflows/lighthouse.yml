name: Mobile Lighthouse

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Mobile performance check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://user:pass@localhost:5432/placeholder
      AWS_REGION: us-east-1
      SESSION_SECRET: ci-placeholder-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Run mobile Lighthouse audit
        id: lhci
        run: npx --yes @lhci/cli@0.14.x autorun

      - name: Report failure
        if: failure() && steps.lhci.outcome == 'failure'
        run: |
          echo "::error::Mobile Lighthouse performance score dropped below the 85 threshold."
          echo "Download the 'lighthouse-mobile-report' artifact from this run to see the full report."

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-mobile-report
          path: .lighthouseci
          if-no-files-found: ignore
          retention-days: 30
